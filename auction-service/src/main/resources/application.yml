server:
  port: 8081
spring:
  application:
    name: auction-service
  datasource:
    url: "jdbc:mysql://localhost:3306/bidding_auction"
    username: root
    password: root
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  kafka:
    bootstrap-servers: localhost:9094
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: true
        spring.json.type.mapping: "AuctionCreatedEvent:com.duc.auction.dto.event.AuctionCreatedEvent,AuctionEndedEvent:com.duc.auction.dto.event.AuctionEndedEvent"
    consumer:
      group-id: auction-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: "*"
        spring.json.type.mapping: "BidEvent:com.duc.auction.dto.event.BidEvent"

app:
  upload:
    dir: uploads/
