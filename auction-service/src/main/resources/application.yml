server:
  port: 8081

spring:
  application:
    name: auction-service
  datasource:
    url: jdbc:mysql://localhost:3306/auction_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: myuser
    password: secret
  jpa:
    hibernate:
      ddl-auto: update

logging:
  pattern:
    level: "%5p [${spring.application.name:app},traceId=%X{traceId}]"
