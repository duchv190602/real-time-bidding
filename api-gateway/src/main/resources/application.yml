server:
  port: 8088

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      mvc:
        routes:
          - id: identity-service
            uri: http://localhost:8080
            predicates:
              - Path=/identity/**
          - id: auction-service
            uri: http://localhost:8081
            predicates:
              - Path=/auction/**
          - id: bidding-service
            uri: http://localhost:8082
            predicates:
              - Path=/bidding/**
          - id: notification-service
            uri: http://localhost:8083
            predicates:
              - Path=/notification/**

security:
  jwt:
    secret: ${JWT_SECRET:change-me-please-change-me-please-32bytes}

logging:
  pattern:
    level: "%5p [${spring.application.name:app},traceId=%X{traceId}]"
