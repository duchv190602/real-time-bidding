server:
  port: 8083

spring:
  application:
    name: bidding-service
  datasource:
    url: jdbc:mysql://localhost:3306/bidding_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: myuser
    password: secret
  jpa:
    hibernate:
      ddl-auto: update
  data:
    redis:
      host: localhost
      port: 6379
  kafka:
    bootstrap-servers: localhost:9092

logging:
  pattern:
    level: "%5p [${spring.application.name:app},traceId=%X{traceId}]"
