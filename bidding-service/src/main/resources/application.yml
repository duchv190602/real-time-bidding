server:
  port: 8082
  servlet:
    context-path: /bidding
spring:
  application:
    name: bidding-service
#  datasource:
#    url: jdbc:mysql://localhost:3306/bidding_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
#    username: root
#    password: root
#  jpa:
#    hibernate:
#      ddl-auto: update
  data:
    redis:
      host: localhost
      port: 6379
  kafka:
    bootstrap-servers: localhost:9094
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: true
        spring.json.type.mapping: "BidEvent:com.duc.bidding.dto.event.BidEvent"
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: "*"
        spring.json.type.mapping: "AuctionCreatedEvent:com.duc.bidding.dto.event.AuctionCreatedEvent,AuctionEndedEvent:com.duc.bidding.dto.event.AuctionEndedEvent"
logging:
  pattern:
    level: "%5p [${spring.application.name:app},traceId=%X{traceId}]"
